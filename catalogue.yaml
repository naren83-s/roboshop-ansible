- name: configure catalogue
  hosts: catalogue
  connection: local
  become: yes
  tasks:
  - name: enable nodejs 20
    ansible.builtin.command: dnf install nodejs 20

  - name: install nodejs
    ansible.builtin.dnf:
      name: nodejs
      state: present

  - name: create system user
    ansible.builtin.user:
      name: roboshop
      system: true
      home: /app
      shell: /sbin/nologin
      comment: "Roboshop system user"
  
  
