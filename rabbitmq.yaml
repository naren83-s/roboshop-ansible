- name: configure rabbitmq server
  hosts: rabbitmq
  become: yes
  tasks:
  - name: copy rabbit repo
    ansible.builtin.copy:
      src: rabbitmq.repo
      dest: /etc/yum.repos.d/rabbitmq.repo
    
  - name: install rabbitmq sserver
    ansible.builtin.dnf:
      name: rabbitmq-server
      state: present

  - name: start and enable rabbitmq
    ansible.builtin.service:
    state: started
    enabled: yes
    name: rabbitmq

  - name: create rabbitmq user
    community.rabbitmq.rabbitmq_user:
      user: roboshop 
      password: roboshop123
      permissions:
        - vhost: /
          configure_priv: .*
          read_priv: .*
          write_priv: .*
      state: present