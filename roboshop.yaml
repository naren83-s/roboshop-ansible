- name: create ec2 instances and r53
  hosts: all
  connection: local
  vars:
    Sg_id: sg-06836c5944ba0ff00
    Ami_id: ami-0220d79f3f480ecf5
    domain_name: naren83.online
    env: dev
    instances:
    - mongodb
    - catalogue
  tasks:
  - name: Create ec2 instances
    amazon.aws.ec2_instance:
      instance_type: "t3.micro"
      security_group: "{{ Sg_id }}"
      image_id: "{{ Ami_id }}"
      name: "{{ item }}-{{ env }}"
      tags:
        Project: roboshop
        Component: "{{ item }}"
        Environment: "{{ env }}"
        Name: "{{ item }}-{{ env }}"
    loop: "{{ instances}}"
    register: ec2_output

  - name: print the output
    ansible.builtin.debug:
      msg: "{{ ec2_output }}"
  
  - name: create Route53
    amazon.aws.route53:
      state: present
      zone: "{{ domain_name }}"
      record: "{{ item.item }}-{{ env }}.{{ domain_name }}"
      type: A
      ttl: 1
      value: "{{ item.instances[0].private_ip_address }}"
      wait: true
    loop: "{{ ec2_output.results }}"